# SonarQube Configuration for Fidelity PlanAlign Engine
sonar.projectKey=fidelity-planalign-engine
sonar.projectName=Fidelity PlanAlign Engine
sonar.projectVersion=2.1.0

# Source directories
sonar.sources=planalign_orchestrator,planalign_cli,planalign_api,config
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# Python settings
sonar.python.version=3.11

# Coverage report (generated by pytest-cov with --cov-report=xml)
sonar.python.coverage.reportPaths=**/coverage.xml

# Exclusions
sonar.exclusions=\
  **/tests/**,\
  **/.venv/**,\
  **/venv/**,\
  **/dbt/dbt_packages/**,\
  **/node_modules/**,\
  **/__pycache__/**,\
  **/migrations/**,\
  **/planalign_studio/**

sonar.test.exclusions=\
  **/tests/**

sonar.coverage.exclusions=\
  **/tests/**,\
  **/conftest.py,\
  **/__init__.py

sonar.host.url=https://sonar.fmr.com/
