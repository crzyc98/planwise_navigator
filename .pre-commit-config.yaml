repos:
  # Basic syntax and formatting checks that don't require full environment
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--unsafe']  # Allow custom YAML tags used by dbt
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict

  # Python syntax validation
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: check-ast  # Python syntax check

  # Formatting & linting — runs on STAGED files only, so pre-existing debt in
  # untouched files never blocks a commit; it just prevents NEW debt and cleans
  # up any file you touch (boy-scout rule). Versions match pyproject/CI.
  - repo: https://github.com/psf/black
    rev: 23.9.1
    hooks:
      - id: black
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.3
    hooks:
      - id: ruff
        args: ['--fix']

  # Local validation reminder (non-blocking)
  - repo: local
    hooks:
      - id: ci-reminder
        name: ci-validation-reminder
        entry: bash -c 'echo "💡 Remember to run ./scripts/run_ci_tests.sh before pushing for full validation"'
        language: system
        files: '(dbt/.*\.(sql|yml|yaml)|orchestrator/.*\.py)$'
        pass_filenames: false
        verbose: true
