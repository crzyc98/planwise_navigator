# filename: .github/workflows/ci.yml
name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'
  DATABASE_PATH: '${{ github.workspace }}/dbt/simulation.duckdb'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Cache uv dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('requirements*.txt', 'pyproject.toml') }}

      - name: Install dependencies
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv pip install --system -r requirements.txt
          uv pip install --system -r requirements-dev.txt

      - name: Run linting
        run: |
          black --check .
          ruff check .
          mypy planalign_orchestrator/ planalign_cli/ planalign_core/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Cache uv dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('requirements*.txt', 'pyproject.toml') }}

      - name: Install dependencies
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv pip install --system -r requirements.txt
          uv pip install --system -r requirements-dev.txt
          # Trigger the sqlparse MAX_GROUPING_TOKENS auto-patch (see
          # planalign_orchestrator.sqlparse_config) so dbt subprocesses spawned
          # by integration tests don't hit sqlparse's 10,000-token limit.
          python -c "import planalign_orchestrator"

      - name: Install dbt packages
        run: |
          # A few integration tests (e.g. the fresh-vs-preinitialized parity
          # contract) drive a real single-year dbt simulation, which needs the
          # dbt packages from packages.yml installed.
          cd dbt
          dbt deps

      - name: Run Python tests
        run: |
          # Coverage gate: actual coverage is ~63% (2026-07); ratchet the
          # threshold up as coverage improves, never down.
          # multi_year_invariants is excluded here: those multi-year suites run
          # in the dedicated multi-year-invariants job (with failure-artifact
          # capture and a longer timeout). Lighter integration tests that drive
          # a real dbt run stay here and rely on the dbt deps installed above.
          pytest tests/ -v -m "not multi_year_invariants" --cov=planalign_orchestrator --cov=planalign_cli --cov=planalign_api --cov=planalign_core --cov-fail-under=60 --cov-report=xml

      # NOTE: no raw `dbt run` here — a full build requires a census parquet
      # (git-ignored) and orchestrator-created tables (e.g.
      # enrollment_decision_projection). dbt compilation is validated in the
      # validate-models job; behavioral dbt tests run locally against
      # isolated databases per the CLAUDE.md validation rule.

      - name: Archive coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  multi-year-invariants:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Cache uv dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('requirements*.txt', 'pyproject.toml') }}

      - name: Install dependencies
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv pip install --system -r requirements.txt
          uv pip install --system -r requirements-dev.txt
          # Trigger the sqlparse MAX_GROUPING_TOKENS auto-patch (see
          # planalign_orchestrator.sqlparse_config) so dbt subprocesses in
          # this job don't hit sqlparse's 10,000-token DoS-protection limit.
          python -c "import planalign_orchestrator"

      - name: Install dbt packages
        run: |
          cd dbt
          dbt deps

      - name: Run multi-year invariant suite
        run: |
          mkdir -p var/test-artifacts/113
          set -o pipefail
          pytest -m multi_year_invariants -v 2>&1 | tee var/test-artifacts/113/diagnostics.log

      - name: Preserve failed invariant databases
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: multi-year-invariants
          path: var/test-artifacts/113/
          retention-days: 7

  edge-config-matrix:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt -r requirements-dev.txt
          python -c "import planalign_orchestrator"
      - name: Install dbt packages
        run: cd dbt && dbt deps
      - name: Run edge configuration matrix
        run: |
          mkdir -p var/test-artifacts/124
          set -o pipefail
          pytest -m edge_config_matrix -v --durations=10 2>&1 | tee var/test-artifacts/124/diagnostics.log
      - name: Preserve failed matrix artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: edge-config-matrix
          path: var/test-artifacts/124/
          retention-days: 7

  validate-models:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dbt
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv pip install --system dbt-core==1.8.8 dbt-duckdb==1.8.1
          uv pip install --system -e .
          # Trigger the sqlparse MAX_GROUPING_TOKENS auto-patch (see
          # planalign_orchestrator.sqlparse_config) so dbt subprocesses in
          # this job don't hit sqlparse's 10,000-token DoS-protection limit.
          python -c "import planalign_orchestrator"

      - name: Validate dbt project
        run: |
          cd dbt
          dbt deps
          # Band macros read seed tables at compile time (run_query), so
          # seeds must be loaded before parse/compile.
          dbt seed --profiles-dir . --threads 1
          dbt parse --profiles-dir .
          dbt compile --profiles-dir .
